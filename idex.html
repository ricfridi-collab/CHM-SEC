<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEM Elite Mastery | Dr. Mohamed Chouidira</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #05100d;
            --vert-bouteille: #1b4d3e;
            --gold-linear: linear-gradient(135deg, #d4af37 0%, #f2d472 50%, #b8860b 100%);
            --gold-solid: #d4af37;
            --text-color: #ffffff;
            --glass-border: rgba(212, 175, 55, 0.3);
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        body {
            background: radial-gradient(circle at top right, #1b4d3e 0%, #05100d 70%);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* واجهة التفعيل */
        #activation-overlay {
            position: fixed; inset: 0; background: var(--primary-bg);
            z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .activation-card {
            background: rgba(27, 77, 62, 0.2); border: 1px solid var(--gold-solid);
            padding: 30px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px);
            max-width: 400px; width: 100%; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .activation-card input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px;
            border: 1px solid var(--gold-solid); background: rgba(0,0,0,0.4);
            color: white; text-align: center; font-size: 1.2rem; outline: none;
        }

        .ticker { background: var(--vert-bouteille); color: var(--gold-solid); padding: 8px 0; font-size: 0.7rem; border-bottom: 1px solid var(--gold-solid); text-align: center; overflow: hidden; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: move 25s linear infinite; font-weight: 600; }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .side-bar { width: 70px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; padding-top: 25px; border-right: 1px solid var(--glass-border); z-index: 10; }
        .nav-item { width: 45px; height: 45px; margin-bottom: 25px; cursor: pointer; filter: grayscale(1) opacity(0.5); transition: 0.4s; }
        .nav-item svg { width: 100%; height: 100%; fill: var(--gold-solid); }
        .nav-item.active { filter: grayscale(0) opacity(1); transform: scale(1.15); filter: drop-shadow(0 0 8px var(--gold-solid)); }

        .main-content { flex: 1; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; background: var(--gold-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 15px 0; }

        .card { background: rgba(27, 77, 62, 0.4); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
        .card-icon { width: 32px; height: 32px; margin-right: 15px; fill: var(--gold-solid); }
        .card-info h3 { margin: 0; font-size: 0.95rem; color: var(--gold-solid); }

        .option-btn { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: white; border-radius: 12px; margin-top: 10px; font-size: 0.95rem; cursor: pointer; }
        .option-btn.correct { background: var(--correct) !important; }
        .option-btn.wrong { background: var(--wrong) !important; }

        .quiz-overlay { position: fixed; inset: 0; background: var(--primary-bg); z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }

        .footer-bar { background: var(--vert-bouteille); border-top: 1px solid var(--gold-solid); padding: 12px 0; text-align: center; }
        .signature { font-family: 'Playfair Display', serif; font-size: 0.75rem; color: var(--gold-solid); letter-spacing: 4px; font-weight: 800; }

        @keyframes move { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="activation-overlay">
        <div class="activation-card">
            <h2 style="font-family:'Playfair Display'; color:var(--gold-solid); margin:0;">BEM ELITE 2026</h2>
            <p style="font-size:0.8rem; opacity:0.7; margin-top:5px;">Online Activation Required</p>
            <input type="text" id="activation-input" placeholder="ENTER ACTIVATION CODE">
            <button id="activate-btn" class="option-btn" style="background:var(--gold-linear); color:black; font-weight:bold;" onclick="handleActivation()">ACTIVATE APP</button>
            <p id="error-msg" style="color:var(--wrong); font-size:0.75rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div class="ticker">
        <div class="ticker-text">🎯 BEM 2026 OFFICIAL HUB • DR. MOHAMED CHOUIDIRA • SMART REVISION 🎯</div>
    </div>

    <div class="app-container">
        <nav class="side-bar">
            <div class="nav-item active" onclick="showHome()"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        </nav>

        <main class="main-content" id="home-view">
            <h1>Elite Revision</h1>
            <div class="card" onclick="startQuiz('Unit 1')">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                <div class="card-info"><h3>Unit 1: Landmarks & Figures</h3></div>
            </div>
            <div class="card" onclick="startQuiz('Unit 2')">
                <svg class="card-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/></svg>
                <div class="card-info"><h3>Unit 2: Grammar Mastery</h3></div>
            </div>
        </main>
    </div>

    <div class="quiz-overlay" id="quiz-overlay">
        <div id="quiz-box"></div>
        <button onclick="showHome()" style="margin-top: 20px; background: none; border: 1px solid var(--gold-solid); color: var(--gold-solid); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer;">BACK TO MENU</button>
    </div>

    <footer class="footer-bar"><div class="signature">DR. MOHAMED CHOUIDIRA</div></footer>

    <script>
        // --- إعدادات الربط مع الشيت الخاص بك ---
        const SHEETDB_API_URL = "https://sheetdb.io/api/v1/at5vemf764m61";

        function getDeviceID() {
            // بصمة تعريفية بسيطة للجهاز
            return btoa(navigator.userAgent + screen.width).substring(0, 12);
        }

        async function handleActivation() {
            const input = document.getElementById('activation-input').value.trim().toUpperCase();
            const error = document.getElementById('error-msg');
            const btn = document.getElementById('activate-btn');

            if (!input) {
                error.innerText = "Please enter a code.";
                error.style.display = "block";
                return;
            }

            error.innerText = "Checking code... Please wait.";
            error.style.display = "block";
            error.style.color = "var(--gold-solid)";
            btn.disabled = true;

            try {
                // 1. البحث عن الكود في ملفك
                const response = await fetch(`${SHEETDB_API_URL}/search?code=${input}`);
                const data = await response.json();

                if (data.length > 0) {
                    const entry = data[0];

                    // 2. التحقق إذا كان الكود مستعملاً مسبقاً
                    if (entry.status === "USED") {
                        error.innerText = "Error: This code is already used on another device.";
                        error.style.color = "var(--wrong)";
                        btn.disabled = false;
                        return;
                    }

                    // 3. تحديث الشيت لشطب الكود وحفظ بصمة الجهاز
                    const update = await fetch(`${SHEETDB_API_URL}/code/${input}`, {
                        method: 'PATCH',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            "data": { "status": "USED", "device_id": getDeviceID() }
                        })
                    });

                    if (update.ok) {
                        // حفظ حالة التفعيل محلياً ليدخل المستخدم مباشرة مستقبلاً
                        localStorage.setItem("BEM_26_ACTIVATED", "TRUE");
                        localStorage.setItem("BEM_USER_CODE", input);
                        document.getElementById('activation-overlay').style.display = 'none';
                    } else {
                        throw new Error("Update failed");
                    }

                } else {
                    error.innerText = "Invalid Code. Please verify your code.";
                    error.style.color = "var(--wrong)";
                    btn.disabled = false;
                }
            } catch (e) {
                error.innerText = "Connection error. Check your internet.";
                error.style.color = "var(--wrong)";
                btn.disabled = false;
            }
        }

        // فحص التفعيل عند فتح التطبيق
        window.onload = () => {
            if (localStorage.getItem("BEM_26_ACTIVATED") === "TRUE") {
                document.getElementById('activation-overlay').style.display = 'none';
            }
        };

        function startQuiz(unit) {
            document.getElementById('quiz-overlay').style.display = 'flex';
            document.getElementById('quiz-box').innerHTML = `<h2 style='color:var(--gold-solid)'>${unit} Exercises</h2><p>Ready to start your elite revision?</p>`;
        }

        function showHome() {
            document.getElementById('quiz-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
